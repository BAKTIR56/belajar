services:

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: usersdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appnet

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - appnet

  api:
    build: ./api
    container_name: api
    restart: always
    depends_on:
      - postgres
      - minio
    networks:
      - appnet
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/usersdb
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: photos

  backend:
    build: ./backend
    container_name: backend
    restart: always
    depends_on:
      - api
    networks:
      - appnet
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    depends_on:
      - backend
    networks:
      - appnet
    ports:
      - "3000:80"

volumes:
  postgres_data:
  minio_data:

networks:
  appnet:
